<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ConectaTEA</title>
</head>

<body>

<h2>ConectaTEA</h2>

<button onclick="login()">Login com Google</button>
<button onclick="docente()">Sou Docente</button>
<button onclick="aluno()">Sou Aluno</button>

<div id="app"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 COLE SUA CONFIG AQUI
const firebaseConfig = {
  apiKey: "COLE_AQUI",
  authDomain: "conectatea-bbd60.firebaseapp.com",
  projectId: "conectatea-bbd60"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// LOGIN
window.login = async function(){
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
  alert("Login realizado!");
}

// DOCENTE
window.docente = function(){
document.getElementById("app").innerHTML = `
<h3>Poste sua aula</h3>
<input id="aula">
<button onclick="postar()">Postar</button>
<div id="lista"></div>
`;
carregar();
}

// POSTAR
window.postar = async function(){
let texto = document.getElementById("aula").value;
await addDoc(collection(db, "aulas"), {texto});
}

// ALUNO
window.aluno = function(){
document.getElementById("app").innerHTML = `
<h3>Aulas disponíveis</h3>
<div id="lista"></div>
`;
carregar();
}

// CARREGAR
window.carregar = function(){
onSnapshot(collection(db, "aulas"), (snapshot)=>{
let html="";
snapshot.forEach(doc=>{
html += "<p>"+doc.data().texto+"</p>";
});
document.getElementById("lista").innerHTML = html;
});
}

</script>

</body>
</html>

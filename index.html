<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ConectaTEA</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>

<body>

<h2>ConectaTEA</h2>

<button onclick="login()">Login com Google</button>

<div id="app"></div>

<script>
// CONFIG FIREBASE (VOCÊ VAI TROCAR DEPOIS)
const firebaseConfig = {
  apiKey: "SUA_CHAVE",
  authDomain: "SEU_APP.firebaseapp.com",
  projectId: "SEU_APP"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// ÁREA DOCENTE
function docente(){
document.getElementById("app").innerHTML = `
<h3>Poste sua aula</h3>
<input id="aula">
<button onclick="postar()">Postar</button>
<div id="lista"></div>
`;
carregar();
}

// POSTAR
function postar(){
let texto = document.getElementById("aula").value;
db.collection("aulas").add({texto: texto});
}

// CARREGAR
function carregar(){
db.collection("aulas").onSnapshot(snapshot=>{
let html="";
snapshot.forEach(doc=>{
html += "<p>"+doc.data().texto+"</p>";
});
document.getElementById("lista").innerHTML = html;
});
}

// ÁREA ALUNO
function aluno(){
document.getElementById("app").innerHTML = `
<h3>Aulas disponíveis</h3>
<div id="lista"></div>
`;
carregar();
}

</script>

<button onclick="aluno()">Aluno</button>
<button onclick="docente()">Docente</button>

</body>
</html>
